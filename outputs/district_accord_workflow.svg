<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" style="background-color: #0f172a; border-radius: 10px;">
  <!-- Arrow Head Definition -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
    </marker>
    <marker id="loop-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="45" fill="#cbd5e1" font-family="sans-serif" font-size="22" font-weight="bold" text-anchor="middle">District Accord: execution.workflow_diagram</text>

  <!-- Box 1: Env Init -->
  <rect x="250" y="80" width="300" height="50" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="400" y="110" fill="#f8fafc" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">1. District Accord Engine</text>
  
  <path d="M 400 130 L 400 162" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 2: Observation -->
  <rect x="250" y="170" width="300" height="50" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="400" y="195" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">2. Format NL Prompt State</text>
  <text x="400" y="212" fill="#94a3b8" font-family="monospace" font-size="11" text-anchor="middle">(Crisis Level, Resources, Stable %)</text>

  <path d="M 400 220 L 400 252" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 3: LLM Inference -->
  <rect x="250" y="260" width="300" height="60" rx="6" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
  <text x="400" y="285" fill="#f8fafc" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">3. Qwen2.5-1.5B Predict</text>
  <text x="400" y="305" fill="#94a3b8" font-family="monospace" font-size="11" text-anchor="middle">Outputs: 4 Action Streams per Prompt</text>

  <path d="M 400 320 L 400 352" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 4: Action Parser -->
  <rect x="250" y="360" width="300" height="50" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="400" y="385" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">4. Dynamic Action Parser</text>
  <text x="400" y="402" fill="#94a3b8" font-family="monospace" font-size="11" text-anchor="middle">Extracts Format &amp; Verifies Valid Target</text>

  <path d="M 400 410 L 400 442" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 5: Reward Engine -->
  <rect x="250" y="450" width="300" height="50" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="400" y="475" fill="#f8fafc" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">5. 5-Component Extrinsic Reward</text>
  <text x="400" y="492" fill="#94a3b8" font-family="monospace" font-size="11" text-anchor="middle">Penalizes Syntax, Rewards Trust Accords</text>

  <path d="M 400 500 L 400 532" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 6: GRPO Policy Update -->
  <rect x="250" y="540" width="300" height="60" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="565" fill="#f8fafc" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">6. TRL / Unsloth GRPO</text>
  <text x="400" y="585" fill="#94a3b8" font-family="monospace" font-size="11" text-anchor="middle">Applies Group Advantages to LoRA Weights</text>

  <!-- Loopback arrow from 6 -> 2 -->
  <path d="M 250 570 L 150 570 L 150 195 L 242 195" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#loop-arrow)"/>
  <text x="135" y="380" fill="#f59e0b" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle" transform="rotate(-90 135 380)">Advance Simulation to Next Turn</text>

</svg>
